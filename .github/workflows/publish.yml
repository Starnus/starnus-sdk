name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on v1.0.0, v1.0.1, etc.

permissions:
  id-token: write  # required for PyPI trusted publisher (OIDC)
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # matches the environment name set on PyPI trusted publisher

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC trusted publisher
